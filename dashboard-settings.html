<head>

        <!-- Main Content -->

        <main class="flex-1 md:ml-64 overflow-y-auto w-full">
            <header

                <div class="flex items-center gap-4">
                    <button class="md:hidden p-2 text-slate-600 dark:text-slate-300">

                    </button>
                    <h1 class="text-xl font-heading font-bold dark:text-white">Settings</h1>
                </div>

                <div class="flex items-center gap-6">
                    <button
                        class="bg-brand-600 hover:bg-brand-700 text-white px-6 py-2 rounded-lg text-sm font-bold transition-colors shadow-lg shadow-brand-500/30">
                        Save Changes
                    </button>
                    <div class="hidden md:block text-right">
                        <div class="font-bold text-slate-900 dark:text-white text-sm">Student Name</div>
                        <div class="text-xs text-slate-500">student@example.com</div>
                    </div>
                    <div

                    </div>
                </div>
            </header>

            <div class="p-4 md:p-8 max-w-7xl mx-auto">
                <div class="grid lg:grid-cols-2 gap-8">

                    <!-- Profile Settings -->
                    <div
                        class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-8">
                        <h3 class="font-bold text-lg text-slate-900 dark:text-white mb-6 flex items-center gap-2">
                            <i data-lucide="user" class="w-5 h-5 text-brand-600"></i> Profile Information
                        </h3>
                        <form class="space-y-5">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Full
                                    Name</label>
                                <input type="text"
                                    class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm outline-none focus:border-brand-500 transition-all"
                                    value="Student Name">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Email
                                    Address</label>
                                <input type="email"
                                    class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm outline-none focus:border-brand-500 transition-all"
                                    value="student@example.com">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Phone
                                    Number</label>
                                <input type="tel"
                                    class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm outline-none focus:border-brand-500 transition-all"
                                    value="+1 (555) 123-4567">
                            </div>
                            <div>
                                <label
                                    class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Address</label>
                                <textarea
                                    class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-sm outline-none focus:border-brand-500 transition-all"
                                    rows="3">123 Main St, Cityville, ST 12345</textarea>
                            </div>
                            <button type="submit"
                                class="w-full py-3 bg-brand-600 hover:bg-brand-700 text-white font-bold rounded-xl shadow-lg shadow-brand-500/20 transition-all">Update
                                Profile</button>
                        </form>
                    </div>

                    <!-- Side Column -->
                    <div class="space-y-8">
                        <!-- Password -->
                        <div
                            class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-8">
                            <h3 class="font-bold text-lg text-slate-900 dark:text-white mb-6 flex items-center gap-2">
                                <i data-lucide="lock" class="w-5 h-5 text-brand-600"></i> Security

                            <form class="space-y-5">
                                <div>
                                    <label
                                        class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Current

                                    <input type="password"

                                </div>

                                    <label

                                </div>
                                <button type="submit"
                                    class="w-full py-3 bg-white dark:bg-slate-700 text-slate-700 dark:text-white border border-slate-200 dark:border-slate-600 hover:bg-slate-50 dark:hover:bg-slate-600 font-bold rounded-xl transition-all">Change
                                    Password</button>
                            </form>
                        </div>

                        <!-- Preferences -->
                        <div
                            class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-8">
                            <h3 class="font-bold text-lg text-slate-900 dark:text-white mb-6 flex items-center gap-2">
                                <i data-lucide="sliders" class="w-5 h-5 text-brand-600"></i> Preferences
                            </h3>
                            <div class="space-y-6">
                                <div class="flex items-center justify-between">
                                    <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Dark
                                        Mode</span>
                                    <label class="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" id="settings-theme-toggle" class="sr-only peer">
                                        <div
                                            class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brand-600">
                                        </div>
                                    </label>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Email

                                    <label class="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" checked class="sr-only peer">
                                        <div
                                            class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brand-600">
                                        </div>
                                    </label>
                                </div>
                                <div class="flex items-center justify-between">
                                    <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">SMS
                                        Notifications</span>
                                    <label class="relative inline-flex items-center cursor-pointer">
                                        <input type="checkbox" class="sr-only peer">
                                        <div
                                            class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brand-600">
                                        </div>
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Theme Logic for Toggle -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();

            // Sync check
            const toggle = document.getElementById('settings-theme-toggle');
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                toggle.checked = true;
                document.documentElement.classList.add('dark');
            } else {
                toggle.checked = false;
                document.documentElement.classList.remove('dark');
            }

            toggle.addEventListener('change', (e) => {
                if (e.target.checked) {
                    document.documentElement.classList.add('dark');
                    localStorage.theme = 'dark';
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.theme = 'light';
                }
            });
        });
    </script>
    <script>
        lucide.createIcons();
    </script>
    <!-- siva@03nika -->
</body>
